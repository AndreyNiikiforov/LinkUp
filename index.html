<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkUp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Экран авторизации -->
<!DOCTYPE html>
<html>
<head>
    <title>LinkUp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>LinkUp</h1>
        <input type="text" placeholder="+7" class="phone-input">
        <input type="password" placeholder="Пароль" class="password-input">
        <button class="login-btn">Войти</button>
        <p>Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
    </div>
</body>
</html>

    <!-- Основное приложение -->
    <div id="app" style="display:none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <div>
                    <span id="currentUserName"></span>
                    <span id="currentUserUsername"></span>
                </div>
                <button id="logoutBtn">Выйти</button>
            </div>
            
            <input type="text" id="searchInput" placeholder="Поиск...">
            <button id="searchButton">Найти</button>
            
            <div id="searchResults" style="display:none;">
                <div id="searchResultsList"></div>
                <button id="closeSearch">Закрыть</button>
            </div>
            
            <div class="tabs">
                <button id="chatsTabBtn" class="tab active">Чаты</button>
                <button id="groupsTabBtn" class="tab">Группы</button>
                <button id="createGroupBtn">+</button>
            </div>
            
            <div id="chatsList"></div>
            <div id="groupsList" style="display:none;"></div>
        </div>

        <div class="main-content">
            <div id="welcomeScreen" class="welcome-screen">
                <h2>Выберите чат</h2>
            </div>

            <div id="chatWindow" style="display:none;">
                <div class="chat-header">
                    <div>
                        <span id="currentChatName"></span>
                        <span id="currentChatUsername"></span>
                        <span id="chatOwnerBadge" style="display:none;">👑</span>
                    </div>
                    <div>
                        <button id="audioCallBtn">📞</button>
                        <button id="videoCallBtn">📹</button>
                        <button id="voiceMsgBtn">🎤</button>
                        <button id="videoCircleBtn">⭕</button>
                    </div>
                </div>

                <div id="messagesArea" class="messages-area"></div>

                <div class="input-panel">
                    <input type="text" id="messageInput" placeholder="Сообщение...">
                    <button id="sendButton">→</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка звонка -->
    <div id="callModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9);">
        <div style="padding:20px; color:white;">
            <h2 id="callName"></h2>
            <p id="callStatus"></p>
            <p id="callTimer">00:00</p>
            <div id="callVideoContainer" style="display:none;">
                <video id="remoteVideo" autoplay style="width:100%;"></video>
                <video id="localVideo" autoplay muted style="width:100px; position:absolute; bottom:10px; right:10px;"></video>
            </div>
            <button id="endCallBtn">Завершить</button>
        </div>
    </div>

    <!-- Модалка входящего звонка -->
    <div id="incomingCallModal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9);">
        <div style="padding:20px; color:white;">
            <h2 id="incomingCallName"></h2>
            <p id="incomingCallType"></p>
            <button id="acceptCallBtn">Принять</button>
            <button id="declineCallBtn">Отклонить</button>
        </div>
    </div>

    <!-- Индикатор записи -->
    <div id="recordingIndicator" style="display:none; position:fixed; top:10px; left:50%; transform:translateX(-50%); background:red; color:white; padding:10px; border-radius:20px;">
        <span id="recordingIcon">🎤</span>
        <span id="recordingTimer">0:00</span>
        <button id="stopRecordingBtn2">⏹️</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="calls.js"></script>
    <script src="voice.js"></script>
</body>
</html>
